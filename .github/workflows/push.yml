name: 资治通鉴每日推送

on:
  schedule:
    - cron: '0 0 * * *'    # 08:00 北京时间 → 晨读
    - cron: '0 4 * * *'    # 12:00 北京时间 → 午思
    - cron: '0 12 * * *'   # 20:00 北京时间 → 夜悟
  workflow_dispatch:

jobs:
  push-to-dingtalk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: 发送钉钉推送
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
        run: python push.py
